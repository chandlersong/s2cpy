syntax = "proto3";

package myservice;

// 服务定义
service NotificationService {
  // 客户端订阅后，服务器主动推送消息（Server Streaming）
  rpc Subscribe(SubscribeRequest) returns (stream Notification) {}
}

message SubscribeRequest {
  string client_id = 1;
  string topic = 2;        // 订阅主题
}

message Notification {
  string id = 1;
  string message = 2;
  int64 timestamp = 3;
  string topic = 4;
}