name: Docker Build & Push (Multi-Platform)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (例如: latest, v1.2.3)'
        required: true
        default: 'latest'
      keep_artifacts:
        description: '保留最近多少个源码压缩包 artifact'
        required: true
        default: '5'

permissions:
  contents: read
  actions: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v6

      - name: 打包源码为 zip (zip file)
        run: zip -r s2cpy-${{ inputs.tag }}.zip . -x ".git/*"

      - name: 上传源码压缩包
        uses: actions/upload-artifact@v4
        with:
          name: s2cpy-${{ inputs.tag }}
          path: s2cpy-${{ inputs.tag }}.zip

      - name: 清理旧源码压缩包 (仅保留最近 N 份)
        uses: actions/github-script@v7
        env:
          KEEP_ARTIFACTS: ${{ inputs.keep_artifacts }}
        with:
          script: |
            const keep = Number.parseInt(process.env.KEEP_ARTIFACTS || '5', 10);
            if (!Number.isFinite(keep) || keep < 1) {
              core.setFailed(`invalid keep_artifacts: ${process.env.KEEP_ARTIFACTS}`);
              return;
            }

            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const targets = artifacts
              .filter((a) => a.name && a.name.startsWith('s2cpy-'))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const toDelete = targets.slice(keep);
            core.info(`Found ${targets.length} s2cpy-* artifacts, keep ${keep}, delete ${toDelete.length}.`);

            for (const artifact of toDelete) {
              core.info(`Deleting artifact: ${artifact.name} (#${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 设置 QEMU (支持 ARM64)
        uses: docker/setup-qemu-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: 构建并推送多平台镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            chandlersong/s2cpy:${{ inputs.tag }}
            chandlersong/s2cpy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max