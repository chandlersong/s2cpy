name: Docker Build & Push (Multi-Platform)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '镜像标签 (例如: latest, v1.2.3)'
        required: true
        default: 'latest'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 打包源码为 zip (zip file)
        run: zip -r s2cpy-${{ inputs.tag }}.zip . -x ".git/*"

      - name: 上传源码压缩包
        uses: actions/upload-artifact@v4
        with:
          name: s2cpy-${{ inputs.tag }}
          path: s2cpy-${{ inputs.tag }}.zip

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 设置 QEMU (支持 ARM64)
        uses: docker/setup-qemu-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: 构建并推送多平台镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            chandlersong/s2cpy:${{ inputs.tag }}
            chandlersong/s2cpy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max