name: CI
on:
  push:
    branches: [ "main",]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      # 推荐使用 --frozen 保证锁定版本
      - name: Sync projectuv run pytest --collectonly -m "not manul"
        run: uv sync --frozen --all-extras --dev

      - name: Run pytest
        run: uv run pytest -m "not manual" -q --tb=no